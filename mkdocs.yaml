
site_name: Art Search API Documentation Test Site
site_description: Art Search API Documentation Test Site
site_author: <OR>
# site_url: https://Alr2002.github.io/artsearch/
site_url: !ENV READTHEDOCS_CANONICAL_URL
copyright: |
    Copyright &copy; 2026 OR
nav:
  - Overview: index.md
  - How to start: how_to_start.md
  - Endpoints:
    - Search Artworks: search_artworks.md
    - Retrieve Artwork by Id: retrieve_artwork_by_id.md
    - Random Artwork: random_artwork.md
  - Authentication: authentication.md
  - Rate limiting: rate_limiting.md
  - Error handling: error_handling.md
  - OpenAPI (Swagger) specification: openapispec.md
extra_css:
    - stylesheets/extra.css
theme:
  name: material
  favicon: assets/favicon.ico
  language: en
  features:
#  - announce.dismiss
  - content.code.annotate
  - content.code.copy
  - content.code.select
  - content.footnote.tooltips
  - content.tabs.link
  - content.tooltips
  - navigation.expand
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  - navigation.path
  - navigation.top
  - navigation.tracking
  - search.highlight
  
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light mode
      primary: blue grey
      accent: deep blue

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark mode
      primary: blue grey
      accent: indigo
#  font:
#    text: Roboto 
    # Merriweather Sans
  icon:
    annotation: material/plus-circle
  #  logo: fontawesome/solid/W
  logo: assets/logo.png
  favicon: assets/favicon.ico
plugins:
  - swagger-ui-tag:
      docExpansion: list
      validatorUrl: none
  - search
markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
# for codeblock
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # for flowchart and diagrams
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
# for tables
  - pymdownx.tabbed:
      alternate_style: true
# callouts
  - admonition
  - pymdownx.details